# Workflow: create-packet-from-issue
# Role: Scaffolds or synchronizes content packets when issues labeled new-packet are opened or edited.
# Executes scripts/create-packet.sh --update and commits resulting folder mutations and catalog index updates.
name: create-packet-from-issue

on:
  issues:
    types:
      - opened
      - labeled
      - edited
      - reopened

jobs:
  create-packet:
    # Execute only when the issue carries the new-packet label
    if: |
      github.event.label.name == 'new-packet' ||
      contains(github.event.issue.labels.*.name, 'new-packet')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract Issue Fields and Scaffold or Synchronize Packet
        id: create
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          python3 - <<'EOF'
          import os, re, sys, subprocess

          body = os.environ.get("ISSUE_BODY", "")
          issue_num = os.environ.get("ISSUE_NUMBER", "")

          def parse_section_multiline(label):
              pattern = r"(?:###|\*\*)\s*" + re.escape(label) + r"(?:\*\*|)\s*\n+([\s\S]*?)(?=\n(?:###|\*\*)|\Z)"
              m = re.search(pattern, body, re.IGNORECASE)
              if m:
                  val = m.group(1).strip()
                  if val != "_No response_":
                      return val
              return ""

          def parse_checkboxes(section_text):
              selected = []
              for line in section_text.splitlines():
                  if re.match(r"^\s*-\s*\[[xX]\]\s*", line):
                      val = re.sub(r"^\s*-\s*\[[xX]\]\s*", "", line).strip().lower()
                      selected.append(val)
              return selected

          title = parse_section_multiline("Title")
          if title:
              title = title.splitlines()[0].strip()
          else:
              title = f"Issue #{issue_num} Packet"

          date_str = parse_section_multiline("Date")
          date = date_str.splitlines()[0].strip() if date_str else "2026-07-15"

          topic_str = parse_section_multiline("Topic Slug") or parse_section_multiline("Topic slug")
          topic = topic_str.splitlines()[0].strip() if topic_str else f"issue-{issue_num}"

          status_str = parse_section_multiline("Initial Lifecycle Status") or parse_section_multiline("Status")
          status = status_str.splitlines()[0].strip() if status_str else "idea"

          context_text = parse_section_multiline("Strategic Context") or parse_section_multiline("Context")

          plat_section = parse_section_multiline("Target Platforms") or parse_section_multiline("Platforms")
          plat_checked = parse_checkboxes(plat_section)
          if not plat_checked:
              plat_checked = ["linkedin", "x", "blog"]

          pillars_str = parse_section_multiline("Content Pillars") or parse_section_multiline("Pillars")
          pillars = pillars_str.splitlines()[0].strip() if pillars_str else "platform-engineering"

          tags_str = parse_section_multiline("Tags")
          tags = tags_str.splitlines()[0].strip() if tags_str else "architecture"

          cmd = [
              "./scripts/create-packet.sh",
              "--date", date,
              "--topic", topic,
              "--title", title,
              "--status", status,
              "--context", context_text,
              "--platforms", ",".join(plat_checked),
              "--pillars", pillars,
              "--tags", tags,
              "--related-project", f"ISSUE-{issue_num}",
              "--author", os.environ.get("ISSUE_AUTHOR", "content-engine"),
              "--update"
          ]
          print("Running command:", " ".join(cmd))
          res = subprocess.run(cmd, capture_output=True, text=True)
          if res.returncode != 0:
              print(f"ERROR creating or updating packet:\n{res.stderr}", file=sys.stderr)
              sys.exit(1)
          print(res.stdout)
          
          year, month, _ = date.split("-")
          packet_dir = f"content/{year}/{month}/{date}-{topic}"
          for line in res.stdout.splitlines():
              if "SUCCESS:" in line and "at content/" in line:
                  packet_dir = line.split("at ")[-1].strip()
                  break
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"packet_dir={packet_dir}\n")
          EOF

      - name: Validate Generated/Synchronized Packet and Update Catalog
        run: |
          chmod +x scripts/validate-packet.sh scripts/generate-catalog.sh
          ./scripts/validate-packet.sh --packet "${{ steps.create.outputs.packet_dir }}"
          ./scripts/generate-catalog.sh

      - name: Commit and Push Synchronized Packet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ registry/catalog.json
          git commit -m "sync: scaffold or update packet from Issue #${{ github.event.issue.number }}" || echo "Nothing to commit"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main || true
            if git push origin main; then
              break
            fi
            sleep 2
          done

      - name: Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Automated content packet synchronized at \`${{ steps.create.outputs.packet_dir }}\` and catalog re-indexed.`
            });