# Workflow: packet-validation
# Role: Enforces schema compliance, manifest referential integrity, and zero em dashes across content packets.
# Triggers on push or pull requests affecting content/, schemas/, registry/, or scripts/.
name: packet-validation

on:
  push:
    branches:
      - main
    paths:
      - 'content/**'
      - 'schemas/**'
      - 'registry/**'
      - 'scripts/**'
  pull_request:
    paths:
      - 'content/**'
      - 'schemas/**'
      - 'registry/**'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: Execute Strict Packet and Schema Validation
        run: |
          chmod +x scripts/validate-packet.sh
          ./scripts/validate-packet.sh --all